<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flexmain{
            height: 500px;
            width: 1300px;
            background-color: rgb(97, 104, 106);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            border-radius: 20px;
        }
        
        
        .flexContainer{
            height: 200px;
            width: 500px;
            background-color: rgb(0, 56, 96);
            display: flex;
            border-radius: 15px;
        }
        .box1{
            height: 50px;
            width: 50px;
            background-color: orange;
            border: solid 2px black;    
        }
        
        
        .flexContainer1{
            height: 200px;
            width: 500px;
            background-color: rgb(0, 56, 96);
            display: flex;
            justify-content: right;
            border-radius: 15px;
        }
        .box2{
            height: 50px;
            width: 50px;
            background-color: orange;
            border: solid 2px black;    
        }
    </style>
</head>
<body>
    <div class = flexmain>
        <div class = flexContainer>
            <div class = box1></div>
            <div class = box1></div>
            <div class = box1></div>
            <div class = box1></div>
    </div>
    
        <div class = flexContainer1>
            <div class = box2></div>
            <div class = box2></div>
            <div class = box2></div>
            <div class = box2></div>
        </div>
    </div>
    
</body>
</html>
