<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        :root{
            --main-height: 100px;
            --main-width: 100px;
            --main-border: solid 2px black;
            --main-position: absolute;
            --main1-background-color: red;
            --main2-background-color: green;
            --main3-background-color: blue;
            --main4-background-color: yellow;
            --main1-z-index: 4;
            --main2-z-index: 3;
            --main3-z-index: 2;
            --main4-z-index: 1;
        }

        .container{
            height: 197px;
            width: 257px;
            background-color: rgb(201, 201, 201);
        }

        .box1{
            height: var(--main-height);
            width: var(--main-width);
            background-color: var(--main1-background-color);
            border: var(--main-border);
            z-index: var(--main1-z-index);
            position: var(--main-position);

            top: 10px;
            left: 10px;
        }
        .box2{
            height: var(--main-height);
            width: var(--main-width);
            background-color: var(--main2-background-color);
            border: var(--main-border);
            z-index: var(--main2-z-index);
            position: var(--main-position);

            top: 40px;
            left: 60px;
        }
        .box3{
            height: var(--main-height);
            width: var(--main-width);
            background-color: var(--main3-background-color);
            border: var(--main-border);
            z-index: var(--main3-z-index);
            position: var(--main-position);

            top: 70px;
            left: 110px;
        }
        .box4{
            height: var(--main-height);
            width: var(--main-width);
            background-color: var(--main4-background-color);
            border: var(--main-border);
            z-index: var(--main4-z-index);
            position: var(--main-position);

            top: 100px;
            left: 160px;
        }

    </style>
</head>
<body>
    <div class = "container">

        <div class = "box1"></div>
        <div class = "box2"></div>
        <div class = "box3"></div>
        <div class = "box4"></div>

    </div>
</body>
</html>
