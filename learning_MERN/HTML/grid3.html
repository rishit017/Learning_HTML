<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid{
            display: grid;
            grid-template-rows: repeat(3, 100px);
            grid-template-columns: repeat(4, 100px);
            gap : 8px;
        }
        .item1{
            grid-row: 1/2;
            grid-column: 1/3;
            background-color: rgb(26, 118, 87);
        }
        .item2{
            grid-row: 1/3;
            grid-column: 3/4;
            background-color: rgb(230, 0, 255);
        }
        .item3{
            grid-row: 1/2;
            grid-column: 4/5;
            background-color: rgb(255, 0, 0);
        }
        .item4{
            grid-row: 2/3;
            grid-column: 4/5;
            background-color: rgb(119, 255, 0);
        }
        .item5{
            grid-row: 2/3;
            grid-column: 1/3;
            background-color: rgb(0, 149, 255);
        }
        .item6{
            grid-row: 3/4;
            grid-column: -5/-1;
            background-color: rgb(255, 136, 0);
        }


    </style>
</head>
<body>
    <div class = "grid">
        <div class = item1></div>
        <div class = item2></div>
        <div class = item3></div>
        <div class = item4></div>
        <div class = item5></div>
        <div class = item6></div>
    </div>
</body>
</html>
