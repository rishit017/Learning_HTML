<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .container{
            display: grid;
            grid-template-columns: repeat(4,100px);
            grid-template-rows: repeat(8,100px);
            gap: 10px;
            background-color: black;
        }
        
        .history{
            grid-row: 1/2;
            grid-column: 1/4;
            background-color: rgb(83, 83, 83);
        }
        
        .ans{
            grid-row: 2/4;
            grid-column: 1/4;
            background-color: rgb(83, 83, 83);
        }

    </style>
</head>
<body>
    <div class = "container">

        <div class = "history"></div>
        <div class = "ans"></div>
        <div class = "row1"></div>
        <div class = "row2"></div>
        <div class = "row3"></div>
        <div class = "row4"></div>

    </div>
</body>
</html>
