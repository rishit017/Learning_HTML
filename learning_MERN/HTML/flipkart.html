<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flipkart Layout Blocks</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: #f1f2f4;
            font-family: Arial;
        }

        .main{
            width: 100%;
            padding: 20px;
        }

        .navbar{
            width: 100%;
            height: 90px;
            background-color: white;
            padding: 15px;
        }

        .top{
            width: 100%;
            height: 25px;
            margin-bottom: 15px;
        }

        .logo{
            width: 140px;
            height: 45px;
            background-color: yellow;
            display: inline-block;
            margin-right: 20px;
        }

        .travel{
            width: 120px;
            height: 45px;
            background-color: lightgray;
            display: inline-block;
        }

        .location{
            width: 300px;
            height: 20px;
            background-color: lightgray;
            float: right;
        }

        .search-section{
            width: 100%;
            margin-top: 15px;
        }

        .search{
            width: 65%;
            height: 45px;
            background-color: lightgray;
            display: inline-block;
            border-radius: 8px;
        }

        .nav-links{
            width: 30%;
            height: 45px;
            display: inline-block;
            vertical-align: top;
            margin-left: 20px;
        }

        .small-block{
            width: 70px;
            height: 30px;
            background-color: lightgray;
            display: inline-block;
            margin-top: 8px;
            margin-right: 20px;
        }

        .categories{
            width: 100%;
            background-color: white;
            margin-top: 10px;
            padding: 15px;
        }

        .category{
            width: 70px;
            display: inline-block;
            margin-right: 20px;
            text-align: center;
        }

        .icon{
            width: 50px;
            height: 50px;
            background-color: lightgray;
            margin: auto;
            margin-bottom: 8px;
        }

        .text{
            width: 60px;
            height: 10px;
            background-color: lightgray;
            margin: auto;
        }

        .banner-section{
            width: 100%;
            margin-top: 15px;
        }

        .banner{
            width: 48%;
            height: 250px;
            background-color: gray;
            display: inline-block;
            border-radius: 10px;
        }

        .banner2{
            margin-left: 3%;
        }

        .products{
            width: 100%;
            background-color: yellow;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        .heading{
            width: 250px;
            height: 25px;
            background-color: white;
            margin-bottom: 20px;
        }

        .product{
            width: 23%;
            height: 220px;
            background-color: white;
            display: inline-block;
            margin-right: 1%;
            border-radius: 8px;
        }

    </style>

</head>
<body>

    <div class="main">

        <div class="navbar">

            <div class="top">
                <div class="logo"></div>
                <div class="travel"></div>

                <div class="location"></div>
            </div>

            <div class="search-section">

                <div class="search"></div>

                <div class="nav-links">
                    <div class="small-block"></div>
                    <div class="small-block"></div>
                    <div class="small-block"></div>
                </div>

            </div>

        </div>

        <div class="categories">

            <div class="category">
                <div class="icon"></div>
                <div class="text"></div>
            </div>

            <div class="category">
                <div class="icon"></div>
                <div class="text"></div>
            </div>

            <div class="category">
                <div class="icon"></div>
                <div class="text"></div>
            </div>

            <div class="category">
                <div class="icon"></div>
                <div class="text"></div>
            </div>

            <div class="category">
                <div class="icon"></div>
                <div class="text"></div>
            </div>

            <div class="category">
                <div class="icon"></div>
                <div class="text"></div>
            </div>

            <div class="category">
                <div class="icon"></div>
                <div class="text"></div>
            </div>

            <div class="category">
                <div class="icon"></div>
                <div class="text"></div>
            </div>

        </div>

        <div class="banner-section">

            <div class="banner"></div>

            <div class="banner banner2"></div>

        </div>

        <div class="products">

            <div class="heading"></div>

            <div class="product"></div>
            <div class="product"></div>
            <div class="product"></div>
            <div class="product"></div>

        </div>

    </div>

</body>
</html>
