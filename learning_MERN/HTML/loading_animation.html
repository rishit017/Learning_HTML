<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 8px;
        }

        .c1{
            display: inline-block;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background-color: blueviolet;
        }
        .c2{
            display: inline-block;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background-color: rgb(122, 226, 43);
        }
        .c3{
            display: inline-block;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background-color: rgb(8, 140, 255);
        }
        .c4{
            display: inline-block;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background-color: rgb(255, 34, 0);
        }
        .c5{
            display: inline-block;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background-color: rgb(255, 0, 247);
        }


        .c1, .c2, .c3, .c4, .c5 {
            animation: wave 1.1s ease-in-out infinite;
        }


        .c1 { 
            animation-delay: 0s; 
        }
        .c2 {
             animation-delay: 0.15
             s;
        }
        .c3 {
             animation-delay: 0.30s; 
        }
        .c4 {
             animation-delay: 0.45s; 
        }
        .c5 {
             animation-delay: 0.60s; 
        }


        @keyframes wave {
            0%, 100% {
                transform: translateY(0);
        }

            50% {
                transform: translateY(-15px);
            }
        }


    </style>
</head>
<body>
    <div class = "c1"></div>
    <div class = "c2"></div>
    <div class = "c3"></div>
    <div class = "c4"></div>
    <div class = "c5"></div>
</body>
</html>
