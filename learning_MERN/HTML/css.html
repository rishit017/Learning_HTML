<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color:aqua;   /*internal css using <style> tag inside <head> tag*/
        }
        #Rishit{
            /* here "#Rishit" is used as an id instead of tag name*/
            color:red;
        }
        .Batch4{
            /* here ".Batch4" is used as an class instead of tag name*/
            color:blue;
        }

    </style>

    <!-- for external css -->
    <link rel = "stylesheet" href = "style.css">   
</head>


<body>
    <h1>Heading</h1>

    <!-- inline css -->
    <h2 style = color:aqua>Heading2</h2>  

    <!-- use # for representing id in style inside head tag-->
    <h1 id = "Rishit">I am Rishit</h1>
    
    <!-- use . for representing id in style inside head tag-->
    <p class = "Batch4">I am in batch4</p>
    
    <h1>This is Rishit</h1>
    
</body>
</html>
