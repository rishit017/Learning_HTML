<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>

    <style>
        .grid{
            display: grid;
            grid-template-rows: repeat(3,100px);
            grid-template-columns: repeat(3,100px);
            /* gap: 8px; */
        }

        .item1{
            grid-column: 1/2;
            grid-row: 1/2;
        }
        .item2{
            grid-column: 2/3;
            grid-row: 1/2;
        }
        .item3{
            grid-column: 3/4;
            grid-row: 1/2;
        }
        .item4{
            grid-column: 1/2;
            grid-row: 2/3;
        }
        .item5{
            grid-column: 2/3;
            grid-row: 2/3;
        }
        .item6{
            grid-column: 3/4;
            grid-row: 2/3;
        }
        .item7{
            grid-column: 1/2;
            grid-row: 3/4;
        }
        .item8{
            grid-column: 2/3;
            grid-row: 3/4;
        }
        .item9{
            grid-column: 3/4;
            grid-row: 3/4;
        }
    </style>
</head>
<body>

    <div class="grid">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
        <div class="item7"></div>
        <div class="item8"></div>
        <div class="item9"></div>
    </div>

    <script>
        const items = document.querySelectorAll(".grid div");

        items.forEach(item => {
            const style = getComputedStyle(item);

            const row = Number(style.gridRowStart);
            const col = Number(style.gridColumnStart);

            if (row === col || row + col === 4) {
                item.style.backgroundColor = "black";
            } else {
                item.style.backgroundColor = "white";
            }
        });
    </script>

</body>
</html>
