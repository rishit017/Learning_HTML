<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        // callback function
        function reena(name){
            console.log("Hello", name);
        }

        // main function
        function rohan(callback){
            callback("Rishit");
        }

        rohan(reena);

    </script>
</body>
</html>
