<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let arr = [2,3,4,5,6,7,8,9];
        let classroom = [
            ["Rahul", "Aman", "Mohit"],
            ["Neha", "Riya", "Pooja"],
            ["Karan", "Ajay", "Ravi"]
        ];

        //print first row
        console.log(classroom[0]);
        
        //print diagonol element
        classroom.forEach((row, i) => {
            row.forEach((column, j) => {
                if (i === j) {
                    console.log(column);
                }
            });
        });

        //print both diagonols
        classroom.forEach((row, i) => {
            row.forEach((column, j) =>{
                if(i === j || i + j === classroom.length - 1){
                    console.log(column);
                }
            })
        });
    </script>
</body>
</html>
