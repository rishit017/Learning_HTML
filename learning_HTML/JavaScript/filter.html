<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let employees = [
        { name: "bhupendr", salary: 70, age: 50, country: "india", department: "IT" },
        { name: "rohan", salary: 50, age: 14, country: "london", department: "Finance" },
        { name: "kartik", salary: 3, age: 2, country: "america", department: "HR" },
        { name: "suraj", salary: 2, age: 19, country: "russia", department: "Finance" },
        { name: "aryan", salary: 1, age: 70, country: "japan", department: "HR" },
        { name: "aryan", salary: 88, age: 40, country: "japan", department: "IT" },
        { name: "jatin", salary: 100, age: 12, country: "russia", department: "HR" },
        { name: "aaditya", salary: 20, age: 19, country: "india", department: "Marketing" },
        { name: "sachi", salary: 1, age: 2, country: "uganda", department: "Finance" },
        { name: "khushi", salary: 35, age: 99, country: "brazil", department: "IT" },
        { name: "parul", salary: 500, age: 34, country: "jamaica", department: "CEO" }
        ];

        let filteredArr = employees.filter(item =>{
            return item.salary > 50;
        })
        console.log(filteredArr);

        //print the objects which satisfy the following conditons
        let filteredArr1 = employees.filter(item => {
            return item.country == "india" && item.salary >= 10;
        });
        console.log(filteredArr1);

        //print the objects whose names start with S
        let filteredArr2 = employees.filter(item => {
            return item.name.startsWith("s");
        })
        console.log(filteredArr2);

        //push a new object into array employees where:
        // 1. name contains all the first letter of all other existing employee names
        // 2. salary contains the avg of all other salaries
        // 3. age 50
        // 4. country india
        // 5. department contains all the 3rd letter of all the existing countries

        let firstLetters = [];
        let thirdLetters = [];
        let totalSalary = 0;

        employees.forEach((element) => {
            firstLetters.push(element.name[0]);
            thirdLetters.push(element.country[2]);
            totalSalary = totalSalary + element.salary;
        });

        let avgSalary = totalSalary / employees.length;

        employees.push({
            name: firstLetters,
            salary: avgSalary,
            age: 50,
            country: "india",
            department: thirdLetters
        });

        console.log(employees);
        
    </script>
</body>
</html>
