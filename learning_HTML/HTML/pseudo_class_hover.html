<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .b1{
            display: inline-block;
            width: 200px;
            height: 200px;
            background-color: rgb(242, 55, 236);
            border: 2px solid black;
            border-radius: 10%;
        }
        .b1:hover{
            background-color: rgb(0, 224, 254);
            width: 250px;
            height: 250px;
        }
        .b2{
            display: inline-block;
            width: 200px;
            height: 200px;
            background-color: rgb(242, 55, 236);
            border: 2px solid black;
            border-radius: 10%;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }
        .b2:hover{
            background-color: rgb(0, 224, 254);
            transform: scale(1.1);
            /* width: 250px;
            height: 250px; */
        }
        </style>
</head>
<body>
    <div class = "b1"></div>
    <div class = "b2"></div>
</body>
</html>
