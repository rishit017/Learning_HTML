<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .navbar{
            width: 100%;
            height: 100px;
            position: absolute;
            background-color: rgb(0, 71, 109);
            /* border-radius: 10px; */
            /* border: 2px solid green; */
        }
        .card1{
            width: 60px;
            height: 60px;
            background-color: rgb(255, 242, 0); 
            display: inline-block;
            margin-left: 20px;
            margin-top: 17px;
            border-radius: 50%;
        }
        .card2{
            width: 1000px;
            height: 60px;
            background-color: rgb(255, 145, 0); 
            display: inline-block;
            margin-left: 20px;
            margin-top: 17px;
            border-radius: 5px;
        }
        .card3{
            width: 10%;
            height: 60px;
            background-color: black; 
            display: inline-block;
            margin-left: 20px;
            margin-top: 17px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class = "card1"></div>
        <div class = "card2"></div>
        <div class = "card3"></div>
    </div>
    
</body>
</html>
