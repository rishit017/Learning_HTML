<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkit Structure</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #f2f2f2;
        }
        .main{
            width: 100%;
            padding: 20px;
        }
        .navbar{
            width: 100%;
            height: 80px;
            background-color: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        .logo{
            height: 50px;
            width: 120px;
            background-color: rgb(255, 255, 0);
            display: inline-block;
            margin-right: 20px;
            border-radius: 5px;
        }
        .location{
            height: 50px;
            width: 220px;
            background-color: #54B226;
            display: inline-block;
            margin-right: 20px;
            border-radius: 5px;
        }
        .search{
            height: 50px;
            width: 500px;
            background-color: #aeadad;
            display: inline-block;
            margin-right: 20px;
            border-radius: 5px;
        }
        .login{
            height: 50px;
            width: 80px;
            background-color: #E5E5E5;
            display: inline-block;
            margin-right: 20px;
            border-radius: 5px;
        }
        .cart{
            height: 50px;
            width: 120px;
            background-color: rgb(167, 165, 165);
            display: inline-block;
            border-radius: 5px;
        }
        .banner{
            width: 100%;
            height: 250px;
            background-color: #31793A;
            margin-bottom: 20px;
            border-radius: 20px;
            
        }
        .cards{
            width: 100%;
            margin-bottom: 20px;
        }
        .card1{
            height: 180px;
            width: 32%;
            background-color: #00BEB4;
            display: inline-block;
            border-radius: 20px;
            margin-right: 1%;
        }
        .card2{
            height: 150px;
            width: 32%;
            background-color: #FAD33D;
            display: inline-block;
            border-radius: 20px;
            margin-right: 1%;
        }
        .card3{
            height: 170px;
            width: 32%;
            background-color: #BBCBE2;
            display: inline-block;
            border-radius: 20px;
        }
        .products{
            width: 100%;
        }
        .product{
            height: 110px;
            width: 110px;
            background-color: #003b75;
            display: inline-block;
            margin: 10px;
            border-radius: 15px;
        }

    </style>

</head>
<body>

    <div class="main">
        <div class="navbar">
            <div class="logo"></div>
            <div class="location"></div>
            <div class="search"></div>
            <div class="login"></div>
            <div class="cart"></div>
        </div>
        <div class="banner"></div>
        <div class="cards">
            <div class="card1"></div>
            <div class="card2"></div>
            <div class="card3"></div>
        </div>
        <div class="products">
            <div class="product"></div>
            <div class="product"></div>
            <div class="product"></div>
            <div class="product"></div>
            <div class="product"></div>
            <div class="product"></div>
            <div class="product"></div>
            <div class="product"></div>
            <div class="product"></div>
            <div class="product"></div>
        </div>
    </div>
</body>
</html>
