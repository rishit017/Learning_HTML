<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --main-height: 100px;
            --main-width: 100px;
            --main1-background-color: rgb(220, 128, 128);
            --main2-background-color: rgb(153, 227, 117);
            --main3-background-color: rgb(101, 163, 239);
            --main4-background-color: rgb(240, 130, 244);
            --main5-background-color: rgb(244, 197, 89);
            --main6-background-color: rgb(148, 148, 148);
            --main-border: solid 2px black;
            --main-position: absolute;
        }
        .container{
            height: 258px;
            width: 368px;
            background-color: rgb(201, 201, 201);
        }
        .box1{
            height: var(--main-height);
            width: var(--main-width);
            background-color: var(--main1-background-color);
            border: var(--main-border);
            display: inline-block;
            z-index: 1;
            position: var(--main-position);
            top: 10px;
            left: 10px;
        }
        .box2{
            height: var(--main-height);
            width: var(--main-width);
            background-color: var(--main2-background-color);
            border: var(--main-border);
            display: inline-block;
            z-index: 2;
            position: var(--main-position);
            top: 40px;
            left: 60px;
        }
        .box3{
            height: var(--main-height);
            width: var(--main-width);
            background-color: var(--main3-background-color);
            border: var(--main-border);
            display: inline-block;
            z-index: 3;
            position: var(--main-position);
            top: 70px;
            left: 110px;
        }
        .box4{
            height: var(--main-height);
            width: var(--main-width);
            background-color: var(--main4-background-color);
            border: var(--main-border);
            display: inline-block;
            z-index: 4;
            position: var(--main-position);
            top: 100px;
            left: 160px;
        }
        .box5{
            height: var(--main-height);
            width: var(--main-width);
            background-color: var(--main5-background-color);
            border: var(--main-border);
            display: inline-block;
            z-index: 5;
            position: var(--main-position);
            top: 130px;
            left: 220px;
        }
        .box6{
            height: var(--main-height);
            width: var(--main-width);
            background-color: var(--main6-background-color);
            border: var(--main-border);
            display: inline-block;
            z-index: 6;
            position: var(--main-position);
            top: 160px;
            left: 270px;
        }
    </style>
</head>
<body>
    <div class = "container">
        <div class = "box1"></div>
        <div class = "box2"></div>
        <div class = "box3"></div>
        <div class = "box4"></div>
        <div class = "box5"></div>
        <div class = "box6"></div>
    </div>
</body>
</html>
