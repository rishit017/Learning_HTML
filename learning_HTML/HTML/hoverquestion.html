<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        .container{
            
            height: 230px;
            width: 360px;
            display: grid;
            grid-template-rows: repeat(2,100px);
            grid-template-columns: repeat(3,100px);
            gap: 20px;
            border: 1px solid black;
        }
        
        .item1{
            margin-top: 10px;
            margin-left: 10px;
            grid-column: 1/2;
            grid-row: 1/2;
            background-color: green;
        }
        .item2{
            margin-top: 10px;
            margin-left: 10px;
            grid-column: 2/3;
            grid-row: 1/2;
            background-color: green;
        }
        .item3{
            margin-top: 10px;
            margin-left: 10px;
            grid-column: 3/4;
            grid-row: 1/2;
            background-color: green;
        }
        .item4{
            margin-top: 10px;
            margin-left: 10px;
            grid-column: 1/2;
            grid-row: 2/3;
            background-color: green;
        }
        .item5{
            margin-top: 10px;
            margin-left: 10px;
            grid-column: 2/3;
            grid-row: 2/3;
            background-color: green;
        }
        .item6{
            margin-top: 10px;
            margin-left: 10px;
            grid-column: 3/4;
            grid-row: 2/3;
            background-color: green;
        }


        .item1:hover{
            border-radius: 50%;
        }
        .item2:active{
            visibility: hidden;
        }
        .item3:active{
            background-color: black;
            scale: 1.1;
        }
        .container :nth-child(6){
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <div class = "container">

        <div class = "item1"></div>
        <div class = "item2"></div>
        <div class = "item3"></div>
        <div class = "item4"></div>
        <div class = "item5"></div>
        <div class = "item6"></div>

    </div>
</body>
</html>
