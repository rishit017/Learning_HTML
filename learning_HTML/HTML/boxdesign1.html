<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Layout</title>
    <style>
        .parent{
            height: 250px;
            width: 700px;
            background-color: black;
            padding: 10px;
            box-sizing: border-box;
        }
        .top{
            display: flex;
            gap: 10px;
        }
        .child1{
            height: 110px;
            width: 250px;
            background-color: red;
        }
        .child2{
            height: 110px;
            flex: 1;
            background-color: red;
        }
        .child3{
            height: 110px;
            background-color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="top">
            <div class="child1"></div>
            <div class="child2"></div>
        </div>
        <div class="child3"></div>
    </div>
</body>
</html>
