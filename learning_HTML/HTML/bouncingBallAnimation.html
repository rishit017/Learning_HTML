<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncing Ball Down Stairs</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f3f3f3;
}

/* Scene */

.scene{
    position:relative;
    width:600px;
    height:350px;
}

/* Stairs */

.step{
    position:absolute;
    width:100px;
    height:8px;
    background:#222;
}

.step::after{
    content:"";
    position:absolute;
    right:0;
    top:0;
    width:8px;
    height:60px;
    background:#222;
}

.s1{left:0;top:40px;}
.s2{left:100px;top:100px;}
.s3{left:200px;top:160px;}
.s4{left:300px;top:220px;}
.s5{left:400px;top:280px;}

/* Ball wrapper moves diagonally */

.ball-wrapper{
    position:absolute;
    animation:move 4s linear infinite;
}

/* Ball bounces */

.ball{
    width:28px;
    height:28px;
    border-radius:50%;
    background:crimson;
    animation:bounce .5s ease-in-out infinite;
}

/* Horizontal + Downward movement */

@keyframes move{

    0%{
        transform:translate(0px,20px);
    }

    25%{
        transform:translate(100px,80px);
    }

    50%{
        transform:translate(200px,140px);
    }

    75%{
        transform:translate(300px,200px);
    }

    100%{
        transform:translate(400px,260px);
    }
}

/* Smooth Arc */

@keyframes bounce{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-45px);
    }
}

</style>
</head>

<body>

<div class="scene">

    <div class="step s1"></div>
    <div class="step s2"></div>
    <div class="step s3"></div>
    <div class="step s4"></div>
    <div class="step s5"></div>

    <div class="ball-wrapper">
        <div class="ball"></div>
    </div>

</div>

</body>
</html>
