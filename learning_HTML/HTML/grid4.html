<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid{
            display: grid;
            gap: 8px;
            grid-template-rows: repeat(4, 100px);
            grid-template-columns: repeat(4, 100px);
        }
        .item1{
            grid-row: 1/3;
            grid-column: 1/3;
            background-color: aqua;
        }
        .item2{
            grid-row: 1/3;
            grid-column: 3/4;
            background-color: rgb(4, 0, 255);
        }
        .item3{
            grid-row: 1/3;
            grid-column: 4/5;
            background-color: rgb(0, 255, 0);
        }
        .item4{
            grid-row: 3/5;
            grid-column: 1/3;
            background-color: rgb(255, 0, 0);
        }
        .item5{
            grid-row: 3/4;
            grid-column: 3/4;
            background-color: rgb(212, 255, 0);
        }
        .item6{
            grid-row: 1/3;
            grid-column: 1/3;
            background-color: rgb(229, 37, 200);
        }
        .item7{
            grid-row: 1/3;
            grid-column: 1/3;
            background-color: aqua;
        }
        .item8{
            grid-row: 1/3;
            grid-column: 1/3;
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
        <div class="item7"></div>
        <div class="item8"></div>
    </div>
</body>
</html>
