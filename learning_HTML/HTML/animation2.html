<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO Abduction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#07142b;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Ground */

.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:80px;
    background:#2e8b57;
}

/* UFO */

.ufo{
    position:absolute;
    top:100px;
    left:50%;
    transform:translateX(-50%);
    animation:hover 2s ease-in-out infinite;
    
}

.top{
    width:100px;
    height:40px;
    background:skyblue;
    border-radius:50% 50% 0 0;
}

.bottom{
    width:140px;
    height:30px;
    margin-left:-20px;
    background:silver;
    border-radius:50%;
}

/* Beam */

.beam{
    position:absolute;
    top:45px;
    left:40%;
    transform:translateX(-50%);

    width:0;

    border-left:60px solid transparent;
    border-right:60px solid transparent;
    border-top:250px solid rgba(255,255,120,.35);

    opacity:0;

    animation:beam 4s infinite;
}

/* Cow */

.cow{
    position:absolute;
    bottom:80px;
    left:49%;
    transform:translateX(-50%);
    font-size:70px;

    animation:abduct 4s infinite;
}

/* ---------------------- */

@keyframes hover{

0%,100%{
transform:translateX(-50%) translateY(0);
}

50%{
transform:translateX(-50%) translateY(-12px);
}

}

/* ---------------------- */

@keyframes beam{

0%,20%{
opacity:0;
}

25%,70%{
opacity:1;
}

80%,100%{
opacity:0;
}

}

/* ---------------------- */

@keyframes abduct{

0%,20%{
transform:translateX(-50%) translateY(0) scale(1);
opacity:1;
}

70%{
transform:translateX(-50%) translateY(-250px) scale(.7);
opacity:1;
}

80%{
opacity:0;
}

81%{
transform:translateX(-50%) translateY(0) scale(1);
opacity:0;
}

100%{
opacity:1;
}

}

</style>
</head>

<body>

<div class="ufo">
    <div class="top"></div>
    <div class="bottom"></div>
    <div class="beam"></div>
</div>

<div class="cow">🐄</div>

<div class="ground"></div>

</body>
</html>
