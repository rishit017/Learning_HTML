<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer{
            display: flex;
            height: 500px;
            width: 500px;
            background-color: rgb(112, 112, 112);
            justify-content: space-around;

        }
        .box1{
            height: 50px;
            width: 50px;
            background-color: rgb(255, 0, 0);
            align-self: flex-start;
            
        }
        .box2{
            height: 50px;
            width: 50px;
            background-color: rgb(255, 0, 0);
            align-self: center;
            
        }
        .box3{
            height: 50px;
            width: 50px;
            background-color: rgb(255, 0, 0);
            align-self: flex-end;

        }
    </style>
</head>

<body>
    <div class = "outer">
        <div class = "box1"></div>
        <div class = "box2"></div>
        <div class = "box3"></div>
    </div>
</body>
</html>
