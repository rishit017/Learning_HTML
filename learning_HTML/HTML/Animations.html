<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* .grid {
            display: grid;
            grid-template-rows: repeat(8, 100px);
            grid-template-columns: repeat(10, 100px);
            gap: 8px;
        } */
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 100px);
            grid-auto-rows: max-content;
            row-gap: 5px;
            column-gap: 8px;
        }



        .item1 {
            grid-row: 1;
            grid-column: 1/10;
            margin-left: 50px;

            font-family: "Coolvetica";
            font-size: 70px;

            opacity: 0;
            transform: translateY(-50px);
            animation: slideDown 1s ease forwards;
        }

        .item1::first-letter {
            font-size: 100px;
            font-family: "Blacksword";
            color: rgb(0, 143, 36);
        }



        .item2 {
            grid-row: 2;
            grid-column: 1/10;
            margin-left: 100px;

            font-family: "Coolvetica";
            font-size: 25px;

            overflow: hidden;
            white-space: nowrap;
            width: 0;
            border-right: 3px solid black;

            animation:
                typing 2s steps(15, end) 1s forwards,
                blink 0.7s step-end infinite;
            }


        .item3 {
            grid-row: 3;
            grid-column: 1/10;
            margin-left: 100px;

            font-family: "Coolvetica";
            font-size: 25px;

            overflow: hidden;
            white-space: nowrap;
            width: 0;
            border-right: 3px solid black;

            animation:
                typing 3s steps(35, end) 3.2s forwards,
                blink 0.7s step-end infinite;
        }


        /* animation */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }



        @keyframes typing {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }

        


    </style>
</head>
<body>
    <div class = "grid">
        <div class = item1>This   is   Rishit</div>
        <div class = item2>A Web Developer</div>
        <div class = item3>Also Proficient at Problem Solving</div>
        <div class = item4></div>
        <div class = item5></div>
        <div class = item6></div>
    </div>
</body>
</html>
