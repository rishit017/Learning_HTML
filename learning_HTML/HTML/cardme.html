<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body{
            background-color: rgb(218,218,218);
        }

        .outermost{
            display: flex;
            flex-direction: column;
            align-items: center;

            height: 600px;
            width: 420px;
            background-color: white;
            border-radius: 25px;
        }

        .upperblue{
            width: 100%;
            height: 200px;
            background-color: rgb(0,136,255);
            border-radius: 25px 25px 0 0;
        }

        .pfpcircle{
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: rgb(255, 255, 255);
            border: 5px solid rgb(0,136,255);
            margin-top: -120px; /* pulls circle upward */
            background-image: url(cat.jpg);
            background-size: cover;
            background-position: center;
        }
        .text1{
            margin-top: 9px;
            font-family: Helvetica Rounded;
            font-size:xx-large;
        }
        .text2{
            margin-top: 9px;
            font-family: Helvetica Rounded;
            font-size:large;
        }
        .holder{
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 115px;
            height: 80px;
            width: 365px;
            background-color: rgb(255, 255, 255);
        }
        .sub{
            display: flex;
            align-items: center;
            justify-content: center;

            height: 60px;
            width: 170px;
            border-radius: 30px;
            background-color: rgb(0,136,255);

            font-family: Helvetica Rounded;
            font-size:x-large;
            color: rgb(255, 255, 255);
        }
        .message{
            display: flex;
            align-items: center;
            justify-content: center;

            height: 60px;
            width: 170px;
            border-radius: 30px;
            background-color: rgb(0,136,255);

            font-family: Helvetica Rounded;
            font-size:x-large;
            color: rgb(255, 255, 255);
        }
        .likes{
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            width: 365px;
            background-color: rgb(182, 182, 182);
        }
    </style>
</head>
<body>

    <div class="outermost">

        <div class="upperblue"></div>

        <div class="pfpcircle"></div>

        <div class="text1">CodingLab</div>
        
        <div class="text2">YouTuber & Blogger</div>

        <div class="holder">

            <div class="sub">Subscribe</div>

            <div class="message">Message</div>

        </div>

        <div class="likes">

            
        </div>

    </div>

</body>
</html>
