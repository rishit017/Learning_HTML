<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid{
            display: grid;
            grid-template-rows: repeat(7, 100px);
            grid-template-columns: repeat(7, 100px);
            gap : 8px;
        }
        .item1{
            border-radius: 30px 0 30px 30px ;
            grid-row: 1/7;
            grid-column: 1/2;
            background-color: black;
        }
        .item2{
            border-radius: 0 30px 0 0 ;
            grid-row: 1/2;
            grid-column: 2/5;
            background-color: rgb(0, 0, 0);
        }
        .item3{
            grid-row: 2/3;
            grid-column: 4/5;
            background-color: rgb(0, 0, 0);
        }
        .item4{
            border-radius: 0 0 30px 0 ;
            grid-row: 3/4;
            grid-column: 2/5;
            background-color: rgb(0, 0, 0);
        }
        .item5{
            grid-row: 4/5;
            grid-column: 2/3;
            background-color: rgb(0, 0, 0);
        }
        .item6{
            grid-row: 5/6;
            grid-column: 3/4;
            background-color: rgb(0, 0, 0);
        }
        .item7{
            grid-row: 6/7;
            grid-column: 4/5;
            background-color: rgb(0, 0, 0);
            border-radius: 0 0 30px 0 ;
        }


    </style>
</head>
<body>
    <div class = "grid">
        <div class = item1></div>
        <div class = item2></div>
        <div class = item3></div>
        <div class = item4></div>
        <div class = item5></div>
        <div class = item6></div>
        <div class = item7></div>
       
    </div>
</body>
</html>
