<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
}

        .container{
            display: grid;
            grid-template-rows: repeat(2,200px);
            grid-template-columns: repeat(2,200px);
            background-color: gray;
        }

        .box1{
            grid-column: 1/2;
            grid-row: 1/2;
            background-color: black;
            transform-origin: top left;
            transition: transform 0.5s ease;
            
        }
        .box2{
            grid-column: 2/3;
            grid-row: 1/2;
            background-color: black;
            transform-origin: top right;
            transition: transform 0.5s ease;
        }
        .box3{
            grid-column: 1/2;
            grid-row: 2/3;
            background-color: black;
            transform-origin: bottom left;
            transition: transform 0.5s ease;
        }
        .box4{
            grid-column: 2/3;
            grid-row: 2/3;
            background-color: black;
            transform-origin: bottom right;
            transition: transform 0.5s ease;
        }

        .box1:hover{
            transform: rotate(90deg);
        }
        .box2:hover{
            transform: rotate(-90deg);
        }
        .box3:hover{
            transform: rotate(-90deg);
        }
        .box4:hover{
            transform: rotate(90deg);
        }

    </style>
</head>
<body>
    <div class  = "container">

        <div class = "box1"></div>
        <div class = "box2"></div>
        <div class = "box3"></div>
        <div class = "box4"></div>

    </div>
</body>
</html>
