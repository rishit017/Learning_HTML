<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Fit</title>
    <style>
        .container{
            width: 800px;
            height: 200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            background-color: rgb(158, 243, 166);
            padding: 15px;
        }

        .item{
            background-color: rgb(42, 127, 29);
            padding: 40px;
            text-align: center;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>

</body>
</html>
