<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkit Layout</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: #f2f2f2;
            padding: 20px;
        }

        .grey{
            background-color: grey;
        }

        /* NAVBAR */

        .navbar{
            width: 100%;
            height: 80px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .logo{
            width: 120px;
            height: 40px;
        }

        .location{
            width: 220px;
            height: 40px;
        }

        .search{
            width: 500px;
            height: 45px;
            border-radius: 10px;
        }

        .login{
            width: 80px;
            height: 35px;
        }

        .cart{
            width: 120px;
            height: 45px;
            border-radius: 10px;
        }

        /* MAIN BANNER */

        .banner{
            width: 100%;
            height: 260px;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        /* SMALL CARDS */

        .cards{
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .card{
            width: 32%;
            height: 180px;
            border-radius: 20px;
        }

        /* PRODUCT ROW */

        .products{
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .product{
            width: 110px;
            height: 110px;
            border-radius: 15px;
        }

    </style>

</head>
<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo grey"></div>

        <div class="location grey"></div>

        <div class="search grey"></div>

        <div class="login grey"></div>

        <div class="cart grey"></div>

    </div>

    <!-- BIG BANNER -->

    <div class="banner grey"></div>

    <!-- SMALL BANNERS -->

    <div class="cards">

        <div class="card grey"></div>

        <div class="card grey"></div>

        <div class="card grey"></div>

    </div>

    <!-- PRODUCT BLOCKS -->

    <div class="products">

        <div class="product grey"></div>
        <div class="product grey"></div>
        <div class="product grey"></div>
        <div class="product grey"></div>
        <div class="product grey"></div>
        <div class="product grey"></div>
        <div class="product grey"></div>
        <div class="product grey"></div>
        <div class="product grey"></div>
        <div class="product grey"></div>

    </div>

</body>
</html>
